<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>haha-center</title>
  <style>
    :root {
      --bg: #262b2f;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --accent: #6eb6ff;
      --on: #7dffb3;
      --border: rgba(255, 255, 255, 0.12);
      --btn: rgba(255, 255, 255, 0.06);
      --btn-on: rgba(125, 255, 179, 0.18);
      --left-w: min(320px, 28vw);
      --right-menu-w: 64px;
      --scroll-size: 8px;
      --scroll-thumb: rgba(255, 255, 255, 0.18);
      --scroll-thumb-hover: rgba(125, 255, 179, 0.45);
      --scroll-track: transparent;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* 全局细滚动条（桌面 / 触控） */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) var(--scroll-track);
    }
    *::-webkit-scrollbar {
      width: var(--scroll-size);
      height: var(--scroll-size);
    }
    *::-webkit-scrollbar-track {
      background: var(--scroll-track);
      border-radius: 999px;
      margin: 4px 0;
    }
    *::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
      min-height: 36px;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: var(--scroll-thumb-hover);
      border: 2px solid transparent;
      background-clip: content-box;
    }
    *::-webkit-scrollbar-thumb:active {
      background: rgba(125, 255, 179, 0.6);
      border: 2px solid transparent;
      background-clip: content-box;
    }
    *::-webkit-scrollbar-corner {
      background: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg) !important;
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #app, .panel-root {
      width: 100%;
      width: 100dvw;
      height: 100%;
      height: 100dvh;
      max-width: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 78% 22%, rgba(66, 115, 190, 0.20), transparent 28%),
        radial-gradient(circle at 36% 68%, rgba(20, 40, 70, 0.45), transparent 34%),
        linear-gradient(135deg, #111822 0%, #070b12 60%, #04060a 100%) !important;
      position: relative;
    }
    .panel-root::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.18) 0 1px, transparent 1.3px),
        radial-gradient(circle, rgba(255,255,255,0.10) 0 1px, transparent 1.2px);
      background-size: 82px 82px, 137px 137px;
      background-position: 8px 13px, 41px 67px;
      opacity: .22;
      z-index: 0;
    }
    .panel-shell {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      gap: 0;
      background: var(--bg);
      --right-menu-w: 64px;
    }
    /* 抽屉是 body 浮层：禁止任何 view-* / drawer-open 改首页尺寸 */
    /* 桌面：菜单里底部状态默认隐藏（外露状态栏已有） */
    .gear-menu-footer { display: none; }
    .gear-icon-menu { display: none; }
    .gear-icon-cog { display: inline; }
    /* ===== 左栏：对齐现仪表盘，无卡牌背景 ===== */
    .panel-left {
      width: var(--left-w);
      min-width: 240px;
      max-width: 360px;
      height: 100%;
      padding: 28px 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      background: transparent;
      border-right: 1px solid transparent;
    }
    /* 左上角信息块：时间大号加粗 → 天气 → 日期（参考图） */
    .left-hero {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 4px;
    }
    .left-time-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      line-height: 1;
      width: 100%;
    }
    .left-time {
      font-size: clamp(52px, 6.2vw, 72px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      color: #fff;
      background: transparent !important;
      border: none !important;
      box-shadow: none;
      text-align: left;
      font-variant-numeric: tabular-nums;
    }
    .left-period {
      font-size: clamp(16px, 1.8vw, 22px);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 1px;
      line-height: 1.2;
      transform: translateY(-2px);
    }
    .left-weather-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      cursor: pointer;
      width: 100%;
    }
    .left-weather-inline .wx-icon {
      font-size: 22px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(255, 200, 80, 0.35));
    }
    .left-weather-inline .wx-temp {
      font-size: clamp(22px, 2.4vw, 28px);
      font-weight: 600;
      color: #fff;
      line-height: 1;
    }
    .left-weather-inline .wx-cond {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
      margin-left: 2px;
    }
    .left-date {
      font-size: clamp(14px, 1.5vw, 16px);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.88);
      margin-top: 8px;
      margin-bottom: 0;
      background: transparent !important;
      border: none !important;
      box-shadow: none;
      text-align: left;
      width: 100%;
      letter-spacing: 0.5px;
    }
    .wx-forecast {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 12px;
      justify-items: center;
      width: 100%;
    }
    .fc-day {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      background: transparent;
      width: 100%;
    }
    .fc-day .fc-t { margin-top: 2px; font-size: 10px; color: rgba(255,255,255,0.55); }

    .left-env {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px 8px;
      margin-top: 6px;
      background: transparent !important;
    }
    .env-cell {
      background: transparent !important;
      border: none !important;
      box-shadow: none;
      padding: 8px 4px;
      min-height: 56px;
      border-radius: 12px;
      cursor: pointer;
      transition: background .15s, box-shadow .15s, transform .12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .env-cell:hover {
      background: rgba(255, 255, 255, 0.06) !important;
      border: none !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.2);
      transform: translateY(-1px);
    }
    .env-cell:active { transform: scale(0.98); }
    .env-icon { font-size: 14px; opacity: 0.85; line-height: 1; }
    .env-name { font-size: 12px; color: var(--muted); margin-top: 2px; text-align: center; }
    .env-val { font-size: 16px; font-weight: 500; margin-top: 2px; text-align: center; }

    /* 时间+天气+日期一块 hover；仅阴影、无边框 */
    .left-clock {
      cursor: pointer;
      border-radius: 14px;
      padding: 6px 8px 10px;
      margin-left: -8px;
      margin-right: -8px;
      transition: background .15s, box-shadow .15s, transform .12s;
      border: none !important;
      box-shadow: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0;
      text-align: left;
      width: 100%;
    }
    .left-clock:hover {
      background: rgba(255, 255, 255, 0.06) !important;
      border: none !important;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.38), 0 2px 10px rgba(0, 0, 0, 0.22) !important;
    }
    .left-clock:active { transform: scale(0.99); }
    .left-clock .left-time,
    .left-clock .left-date,
    .left-clock .left-period {
      cursor: inherit;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
    }

    /* 弹窗：高于手机菜单(10060) */
    .ha-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20000;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ha-modal {
      width: min(420px, 100%);
      max-height: min(80vh, 640px);
      overflow: auto;
      background: rgba(38, 43, 47, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 18px 18px 14px;
      color: #fff;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }
    .ha-modal.wide {
      width: min(480px, 100%);
      max-height: min(88vh, 720px);
    }
    .ha-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .ha-modal-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .ha-modal-close {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .ha-modal-close:hover { background: rgba(255,255,255,0.14); }
    .ha-modal-body { font-size: 14px; color: rgba(255,255,255,0.88); }
    .ha-modal-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .ha-modal-row:last-child { border-bottom: none; }
    .ha-modal-k { color: rgba(255,255,255,0.55); }
    .ha-modal-v { font-weight: 500; text-align: right; word-break: break-all; }
    .ha-modal-big {
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 1px;
      margin: 4px 0 8px;
    }
    .ha-modal-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 10px; }
    .ha-modal-forecast {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .ha-modal-fc {
      text-align: center;
      padding: 8px 4px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      font-size: 12px;
    }

    /* 设备详情控制 */
    .dev-detail { padding-bottom: 4px; }
    .dev-ctrl-row {
      display: flex;
      gap: 8px;
      margin: 10px 0;
    }
    .dev-ctrl-row.wrap { flex-wrap: wrap; }
    .dev-ctrl-btn {
      flex: 1;
      min-height: 42px;
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .dev-ctrl-btn:active { transform: scale(0.98); }
    .dev-ctrl-btn.busy,
    .dev-chip-btn.busy {
      opacity: 0.55;
      pointer-events: none;
    }
    .dev-modal-hint {
      margin: 0 0 10px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .dev-modal-hint.ok {
      color: #d9ffe9;
      border-color: rgba(125, 255, 179, 0.35);
      background: rgba(125, 255, 179, 0.1);
    }
    .dev-modal-hint.err {
      color: #ffc9c9;
      border-color: rgba(255, 120, 120, 0.35);
      background: rgba(255, 80, 80, 0.1);
    }
    .dev-ctrl-btn.active {
      background: rgba(125, 255, 179, 0.16);
      border-color: rgba(125, 255, 179, 0.4);
      color: #d9ffe9;
    }
    .dev-ctrl-btn.danger {
      border-color: rgba(255, 120, 120, 0.35);
      color: #ffc9c9;
    }
    .dev-slider-block {
      margin: 14px 0 10px;
      padding: 12px 12px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .dev-slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 8px;
    }
    .dev-slider-val {
      color: rgba(125, 255, 179, 0.9);
      font-weight: 500;
    }
    .dev-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      outline: none;
    }
    .dev-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #7dffb3;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      cursor: pointer;
    }
    .dev-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #7dffb3;
      border: 2px solid rgba(255,255,255,0.9);
      cursor: pointer;
    }
    .dev-slider-marks {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
    .dev-presets { margin-top: 4px; }
    .dev-chip-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.85);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      min-height: 34px;
      cursor: pointer;
    }
    .dev-chip-btn.active {
      background: rgba(125, 255, 179, 0.16);
      border-color: rgba(125, 255, 179, 0.4);
      color: #d9ffe9;
    }
    .dev-section-label {
      margin: 12px 0 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
    }
    .dev-temp-ctrl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 8px 0 12px;
    }
    .dev-temp-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }
    .dev-temp-val {
      min-width: 96px;
      text-align: center;
      font-size: 36px;
      font-weight: 300;
    }
    .dev-temp-val .u {
      font-size: 16px;
      opacity: 0.55;
      margin-left: 2px;
    }

    .left-status-bar {
          display: flex;
          align-items: center;
          gap: 8px;
          min-height: 30px;
          margin-top: auto;
          position: relative;
          z-index: 70;
        }
        /* 首页参考图：菜单在右侧，左下状态/齿轮隐藏 */
        .panel-shell.view-home .left-status-bar { display: none !important; }
    .status-gear {
      appearance: none;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      width: 36px;
      height: 36px;
      min-width: 36px;
      min-height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      transition: background .15s, color .15s, box-shadow .15s, transform .12s;
      touch-action: manipulation;
    }
    .status-gear:hover,
    .status-gear.open {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.28);
    }
    .left-status {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .left-status.ok { color: rgba(125, 255, 179, 0.65); }

    /* 齿轮悬浮菜单 */
    .gear-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      min-width: 168px;
      max-width: min(88vw, 280px);
      padding: 6px;
      border-radius: 14px;
      background: rgba(32, 36, 42, 0.96);
      box-shadow: 0 14px 36px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.25);
      border: none;
      display: none;
      flex-direction: column;
      gap: 2px;
      z-index: 80;
    }
    .gear-menu.open { display: flex; }
    .gear-menu-item {
      appearance: none;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.88);
      text-align: left;
      padding: 12px 14px;
      min-height: 44px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .12s;
      touch-action: manipulation;
    }
    .gear-menu-item:hover {
      background: rgba(255,255,255,0.08);
    }
    .gear-menu-item.active {
      background: rgba(110, 182, 255, 0.16);
      color: #fff;
    }
    .gear-menu-item .mi {
      width: 18px;
      text-align: center;
      opacity: 0.85;
    }
    .gear-menu-footer {
      margin-top: 4px;
      padding: 10px 12px 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .gear-menu-status {
      display: block !important;
      flex: none !important;
      white-space: normal;
      line-height: 1.35;
      font-size: 12px;
      max-width: none;
      overflow: visible;
      text-overflow: unset;
    }

    /* 右侧视图：首页常驻；设备/日志/设置在抽屉内 */
    .view-pane {
      display: none;
      flex: 1;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
    }
    .view-pane.active {
      display: flex;
    }
    #view-home.view-pane {
      display: flex;
    }
    .view-log,
    .view-settings,
    .view-devices {
      padding: 8px 4px 8px 8px;
      overflow: auto;
      color: rgba(255,255,255,0.88);
      -webkit-overflow-scrolling: touch;
    }
    .view-head {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 2px;
      margin: 4px 0 12px 2px;
      color: #fff;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .view-head-sub {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0;
      color: rgba(255,255,255,0.35);
    }
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .log-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      line-height: 1.45;
    }
    .log-item.log-ws {
      border-left: 2px solid rgba(125, 255, 179, 0.45);
      background: rgba(125, 255, 179, 0.05);
    }
    .log-item .log-time {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      margin-bottom: 4px;
    }

    /* ===== 设备页 ===== */
    .dev-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 2px 10px;
      flex-wrap: wrap;
    }
    .dev-search {
      flex: 1 1 180px;
      min-width: 0;
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .dev-search::placeholder { color: rgba(255,255,255,0.35); }
    .dev-search:focus {
      border-color: rgba(125, 255, 179, 0.35);
      box-shadow: 0 0 0 2px rgba(125, 255, 179, 0.08);
    }
    .dev-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }
    .dev-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 2px 12px;
    }
    .dev-chip {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.72);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      min-height: 32px;
    }

    /* ===== 首页 Banner：参考图（中间 3D，底部场景卡，右侧菜单） ===== */
    .panel-banner {

      background: transparent;
    }
    .home-hero-layout {
      flex: 1 1 auto;
      min-height: 0;

      grid-template-columns: minmax(0, 1fr) 56px;

    .home-visual {
      position: relative;
      min-width: 0;

    .plan-stage {
      position: relative;
      width: 100%;
      height: 100%;

      border: none !important;

    #canvas-container, #canvas-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      background: transparent !important;
    }
    .right-menu {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      padding: 8px 0 0;

      border: none;

      min-width: 56px;

    .right-menu-item {

      width: 44px;
      height: 44px;
      border: none;
      border-radius: 16px;
      background: transparent;
      color: rgba(255,255,255,0.82);
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: background .15s, transform .12s, box-shadow .15s;
      flex-shrink: 0;
    }
    .right-menu-item:hover,
    .right-menu-item.active {
      background: rgba(255,255,255,0.08);
      color: #fff;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    }
    .right-menu-item:active { transform: scale(0.96); }

    /* ===== 抽屉：body 浮层 + macOS 类 Genie（WAAPI 驱动主动画） ===== */
    .drawer-root {
      position: fixed;
      inset: 0;
      z-index: 9000;
      pointer-events: none;
      visibility: hidden;
    }
    .drawer-root.open {
      pointer-events: auto;
      visibility: visible;
    }
    .drawer-mask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      opacity: 0;
      transition: opacity .42s ease;
    }
    .drawer-root.open .drawer-mask { opacity: 1; }
    .drawer-root:not(.open) .drawer-mask { transition-delay: .06s; }

    .drawer-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: min(80vw, 80%);
      max-width: 80%;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: rgba(22, 26, 34, 0.58);
      -webkit-backdrop-filter: blur(28px) saturate(1.25);
      backdrop-filter: blur(28px) saturate(1.25);
      border-left: 1px solid rgba(255,255,255,0.10);
      box-shadow: -18px 0 48px rgba(0,0,0,0.35);
      transform-origin: 50% 50%;
      will-change: transform, opacity, filter, clip-path, border-radius;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    /* 静态兜底态（截图失败时） */
    .drawer-panel.genie-docked {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .drawer-panel.genie-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .drawer-panel.genie-closing {
      pointer-events: none;
    }
    .genie-fx-canvas {
      position: fixed !important;
      inset: 0 !important;
      z-index: 12000 !important;
      pointer-events: none !important;
    }
    @media (prefers-reduced-motion: reduce) {
      .drawer-mask { transition-duration: .01ms !important; }
    }
    .drawer-close {
      appearance: none;
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      z-index: 5;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 22px rgba(0,0,0,0.22);
    }
    .drawer-close:hover {
      background: rgba(255,255,255,0.14);
    }
    .drawer-close:active { transform: scale(0.96); }
    .drawer-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: max(58px, calc(46px + env(safe-area-inset-top))) 18px max(18px, env(safe-area-inset-bottom)) 18px;
      overflow: hidden;
    }
    .drawer-view {
      display: none !important;
      flex: 1;
      min-height: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .drawer-view.active {
      display: flex !important;
      flex-direction: column;
    }
    body.drawer-open {
      overflow: hidden;
    }

    .home-bottom {
      flex: 0 0 auto;
      padding: 14px 8px 2px 0;
    }
    .banner-title, .ctrl-section-label, .banner-dots { display: none !important; }
    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }
    .left-status-bar,
    .status-gear,
    .gear-menu,
    .left-status-inline,
    .gear-menu-footer { display: none !important; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 20; color: #fff; font-size: 14px;
      background: rgba(28,28,40,0.9); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 20px;
    }
    #ha-link-hint, #top-bar { display: none !important; }

    .ctrl-lights { display: none !important; }
    .ctrl-scenes {
      display: grid;
      grid-template-columns: repeat(8, minmax(76px, 1fr));
      gap: 12px;
      background: transparent;
    }
    .sw-btn, .sc-btn {
      appearance: none;
      border: none !important;
      color: #fff;
      cursor: pointer;
      box-shadow: none;
      transition: background .15s, box-shadow .15s, transform .12s;
    }
    .sc-btn {
      min-height: 82px;
      border-radius: 22px;
      padding: 12px 10px 10px;
      background: rgba(255,255,255,0.055);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .5px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .sc-btn::before {
      content: attr(data-icon);
      font-size: 25px;
      line-height: 1;
      opacity: .95;
    }
    .sc-btn.primary {
      background: linear-gradient(145deg, rgba(73, 142, 255, 0.95), rgba(39, 102, 222, 0.88));
      box-shadow: 0 16px 40px rgba(45, 105, 220, 0.28);
    }
    .sc-btn:hover, .sw-btn:hover {
      border: none !important;
      background: rgba(255, 255, 255, 0.09) !important;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.38), 0 2px 8px rgba(0, 0, 0, 0.2);
      transform: translateY(-1px);
    }
    .sc-btn.primary:hover {
      background: linear-gradient(145deg, rgba(83, 152, 255, 1), rgba(45, 112, 234, .95)) !important;
    }
    .sw-btn:active, .sc-btn:active { transform: scale(0.98); }
    .sw-btn.busy, .sc-btn.busy { opacity: 0.6; pointer-events: none; }

    .sw-btn { display: none; }
    .sw-dot { display: none; }

    @media (max-width: 900px) {
      .panel-shell {
        flex-direction: column;
        height: 100%;
        height: 100dvh;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        position: relative;
        box-sizing: border-box;
      }

      /* 手机：左上角 ☰ 菜单；连接状态放菜单底部 */
      .gear-icon-cog { display: none !important; }
      .gear-icon-menu { display: inline !important; font-size: 20px; line-height: 1; }
      .left-status-inline { display: none !important; }
      .gear-menu-footer { display: block !important; }

        padding: max(16px, env(safe-area-inset-top)) 12px 8px;
        gap: 6px;
        overflow: visible !important;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .left-status-bar {
        display: none !important;
      }
      .status-gear,
      .gear-menu { display: none !important; }
      .gear-menu-item { min-height: 48px; font-size: 15px; }

      /* 抽屉打开时不改首页；内容仅在 body 浮层 */
      .left-status-bar,
      .status-gear,
      .gear-menu { display: none !important; }

      .left-clock { padding: 4px 2px 8px; }
      .left-time { font-size: clamp(40px, 11vw, 56px); font-weight: 700; }
      .left-period { font-size: 15px; }
      .left-weather-inline { margin-top: 8px; gap: 6px; }
      .left-weather-inline .wx-icon { font-size: 18px; }
      .left-weather-inline .wx-temp { font-size: 20px; }
      .left-weather-inline .wx-cond { font-size: 12px; }
      .left-date { font-size: 13px; margin-top: 6px; }
      .wx-forecast { display: none; }
      .left-env {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
      }
      .env-cell { padding: 8px 4px; }
      .env-name { font-size: 11px; }
      .env-val { font-size: 13px; }

      /* 首页：不锁死高度，随内容增高 → 外壳可滚 */
      .panel-banner {
        flex: 0 0 auto !important;
        width: 100%;
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
        padding: 0 8px max(16px, env(safe-area-inset-bottom));
        overflow: visible !important;
        display: block !important;
      }
      #view-home.view-pane {
        display: flex !important;
        flex: none !important;
        height: auto !important;
        min-height: 0 !important;

      /* 手机：菜单回到首页右列，不 fixed 挡内容 */
      .home-hero-layout {
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) 46px !important;

        flex: none !important;

      .plan-stage {

        min-height: 260px !important;
        border-radius: 20px;
      }
      #canvas-container,
      #canvas-container canvas {
        touch-action: pan-y !important;
      }
      .home-bottom {
        padding: 10px 8px 14px 0 !important;
      }
      .ctrl-scenes {
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
        gap: 8px;
      }
      .sc-btn {

        border-radius: 16px;
        padding: 9px 6px;

      .banner-dots { display: none !important; }
      .left-status-bar,
      .status-gear,
      .gear-menu { display: none !important; }

      /* 抽屉全屏浮层 + Genie；宽约 80% */
      .drawer-root {
        inset: 0 !important;
      }
      .drawer-panel {
        width: 80% !important;
        max-width: 80% !important;
      }
      .drawer-body {
        padding:
          max(54px, calc(42px + env(safe-area-inset-top)))
          14px
          max(14px, env(safe-area-inset-bottom))

        max-width: 100%;

    /* 更窄手机 / 竖屏小屏 */

      .panel-shell {

        flex: 1 0 auto !important;
