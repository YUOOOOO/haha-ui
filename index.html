<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Home UI - 3D户型图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  /* 渐变背景 */
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      display: block;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 18px;
      text-align: center;
      z-index: 200;
    }
    #loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    
    /* 顶部信息栏 */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0) 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      z-index: 200;
      pointer-events: none;
    }

    #top-bar > * {
      pointer-events: auto;
    }
    
    /* 左侧：时间日期 */
    #time-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    #current-time {
      font-size: 56px;
      font-weight: 200;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }
    
    #current-date {
      font-size: 18px;
      font-weight: 400;
      color: #ffffff;
      opacity: 0.9;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }
    
    /* 右侧：天气 */
    #weather-section {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    
    #weather-icon {
      font-size: 48px;
      line-height: 1;
    }
    
    #weather-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    #weather-temp {
      font-size: 32px;
      font-weight: 300;
      color: #ffffff;
      line-height: 1;
    }
    
    #weather-condition {
      font-size: 14px;
      color: #ffffff;
      opacity: 0.8;
    }
    
    /* 底部控制栏 */
    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 40px;
      z-index: 200;
      pointer-events: none; /* 栏本身不挡操作，按钮可点 */
    }

    #bottom-bar #settings-btn {
      pointer-events: auto;
      z-index: 201;
      position: relative;
    }
    
    /* 房间名称标签（预留） */
    .room-label {
      position: absolute;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      pointer-events: none;
      z-index: 50;
    }
    
    /* 响应式 */
    /* 设置按钮 */
    #settings-btn {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    
    #settings-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
    
    #settings-btn:active {
      transform: translateY(0);
    }
    
    @media (max-width: 768px) {
      #top-bar {
        padding: 0 20px;
        height: 60px;
      }
      
      #current-time {
        font-size: 36px;
      }
      
      #current-date {
        font-size: 14px;
      }
      
      #weather-section {
        padding: 12px 16px;
        gap: 12px;
      }
      
      #weather-icon {
        font-size: 32px;
      }
      
      #weather-temp {
        font-size: 24px;
      }
      
      #weather-condition {
        font-size: 12px;
      }
      
      #settings-btn {
        padding: 10px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="loading">加载中</div>
    
    <!-- 顶部信息栏 -->
    <div id="top-bar">
      <!-- 左侧：时间日期 -->
      <div id="time-section">
        <div id="current-time">--:--</div>
        <div id="current-date">---- -- --</div>
      </div>
      
      <!-- 右侧：天气 -->
      <div id="weather-section" style="display: none;">
        <div id="weather-icon">🌤️</div>
        <div id="weather-info">
          <div id="weather-temp">--°C</div>
          <div id="weather-condition">--</div>
        </div>
      </div>
    </div>
    
    <!-- 底部控制栏 -->
    <div id="bottom-bar">
      <button id="settings-btn" type="button" title="设置">
        ⚙️ 设置
      </button>
    </div>
  </div>

  <script>
    function openSettings() {
      // 不用 window features，避免被弹窗拦截；同页打开更稳
      window.location.href = '/settings.html';
    }
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('settings-btn');
      if (btn) btn.addEventListener('click', openSettings);
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
